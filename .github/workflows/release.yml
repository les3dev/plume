name: 'Publish Release'

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    publish-tauri:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: 'macos-latest'
                      args: '--target aarch64-apple-darwin'
                    - platform: 'macos-15'
                      args: '--target x86_64-apple-darwin'

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install frontend deps
              run: pnpm install --frozen-lockfile

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Add macOS Rust targets
              run: |
                  rustup target add aarch64-apple-darwin || true
                  rustup target add x86_64-apple-darwin || true

            - name: Build AudioCapture dylib
              run: |
                  cd src-tauri/audio-capture
                  cargo build --release
                  mkdir -p ../target/release
                  cp target/release/libAudioCapture.dylib ../target/release/libAudioCapture.dylib

            - name: Build and release with Tauri
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Plume ${{ github.ref_name }}'
                  releaseBody: |
                      Release automatique pour ${{ github.ref_name }}.
                  prerelease: true
                  args: ${{ matrix.args }}
